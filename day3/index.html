<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Product Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="wrapper">
        <article class="product-card">
            <figure class="product-image">
                <span class="badge">Hemat 30%</span>
                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=600" alt="Sepatu Lari Nike Merah">
            </figure>

            <section class="product-content">
                <header>
                    <small class="category">EDISI TERBATAS</small>
                    <h1 class="title">Nike Air Max 270</h1>
                </header>
                
                <p class="description">
                    Rasakan sensasi berjalan di atas awan dengan teknologi Air Unit terbaru. Desain ramping untuk gaya hidup aktif.
                </p>

                <div class="price-container">
                    <span class="current-price">Rp 1.500.000</span>
                    <span class="old-price">Rp 2.100.000</span>
                </div>

                <button class="cta-button">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path>
                    </svg>
                    Tambah ke Keranjang
                </button>
            </section>
        </article>
    </main>

</body>
</html>
